<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADADA POINTAGE</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .flex { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 20px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn-depart { background: #fee2e2; color: #b91c1c; border: 2px solid #fecaca; }
        .btn-retour { background: #dcfce7; color: #15803d; border: 2px solid #bbf7d0; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .heure-box { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 5px; font-size: 14px; }
        .conv { color: #2563eb; font-weight: bold; font-size: 20px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); padding: 20px; z-index: 100; overflow-y: auto; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; }
        .check-btn { padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: white; font-size: 10px; flex: 1; }
        .check-btn.active { background: #2563eb; color: white; border-color: #1e40af; }
    </style>
</head>
<body>

    <div class="card" style="text-align:center;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="navDate(-1)" style="width:40px; height:40px;"> < </button>
            <b id="dateAffichage" style="text-transform: uppercase;"></b>
            <button onclick="navDate(1)" style="width:40px; height:40px;"> > </button>
        </div>
        <button onclick="ouvrir('modRecap')" style="margin-top:10px; color:blue; background:none; border:none; text-decoration:underline;">Voir récap du jour</button>
    </div>

    <div class="flex">
        <button id="btnD" class="btn btn-depart" onclick="clicAction('D')">DÉPART</button>
        <button id="btnR" class="btn btn-retour" onclick="clicAction('R')">RETOUR</button>
    </div>

    <div class="card">
        <h4 style="margin:0 0 10px 0; color:#666;">TRANCHES</h4>
        <div id="listeT"></div>
        <button onclick="ajouterM()" style="font-size:10px; margin-top:10px; color:#999;">+ Ajouter manuel</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b>HEURES</b>
            <label style="font-size:11px;"><input type="checkbox" id="halfH" onchange="maj()"> Appliquer ½h</label>
        </div>
        <div class="flex" style="margin-top:10px;">
            <div style="flex:1;">Réelles: <br><span id="txtR">0h00</span></div>
            <div style="flex:1; border-left:1px solid #eee; padding-left:10px;">Conv.: <br><span id="txtC" class="conv">0h00</span></div>
        </div>
    </div>

    <div class="card">
        <input type="number" id="inKm" oninput="saveInputs()" placeholder="Kilométrage fin" style="width:90%; padding:10px; border:none; border-bottom:1px solid #ccc; font-weight:bold;">
        <textarea id="inCom" oninput="saveInputs()" placeholder="Commentaires..." style="width:90%; margin-top:10px; border:1px solid #eee; padding:5px;"></textarea>
    </div>

    <div class="card">
        <button onclick="ouvrir('modList')" style="width:100%; padding:10px; margin-bottom:5px;">GÉRER ÉLÈVES</button>
        <button onclick="ouvrir('modPres')" style="width:100%; padding:15px; background:black; color:white; font-weight:bold; border-radius:10px;">PRÉSENCES ?</button>
    </div>

    <div id="modRecap" class="modal">
        <div class="modal-content">
            <h3 style="text-align:center; border-bottom:1px dashed #ccc; padding-bottom:10px;">RÉCAPITULATIF</h3>
            <div id="resRecap" style="font-family:monospace; font-size:12px; white-space:pre-wrap;"></div>
            <button onclick="fermer('modRecap')" style="width:100%; padding:15px; margin-top:20px;">FERMER</button>
        </div>
    </div>

    <div id="modList" class="modal">
        <div class="modal-content">
            <h3>Élèves</h3>
            <div class="flex"><input id="newE" style="flex:2; padding:10px;"><button onclick="addE()" style="flex:1;">+</button></div>
            <div id="divList" style="margin-top:15px;"></div>
            <button onclick="fermer('modList')" style="width:100%; padding:15px; margin-top:20px; background:#eee;">OK</button>
        </div>
    </div>

    <div id="modPres" class="modal">
        <div class="modal-content">
            <h3>Pointage Présences</h3>
            <div id="gridP"></div>
            <button onclick="fermer('modPres')" style="width:100%; padding:15px; margin-top:20px; background:green; color:white; font-weight:bold;">VALIDER</button>
        </div>
    </div>

    <script>
        let dateJ = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('adada_final_db')) || {};
        let eleves = JSON.parse(localStorage.getItem('adada_final_eleves')) || [];

        function navDate(n) { 
            let d = new Date(dateJ); d.setDate(d.getDate() + n); 
            dateJ = d.toISOString().split('T')[0]; 
            maj(); 
        }

        function clicAction(type) {
            let data = db[dateJ] || { t: [], km: "", com: "", p: {} };
            let h = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            if(type === 'D') data.t.push({s: h, e: "", f: 0});
            else if(data.t.length > 0) data.t[data.t.length-1].e = h;
            db[dateJ] = data;
            sauver();
        }

        function maj() {
            let data = db[dateJ] || { t: [], km: "", com: "", p: {} };
            document.getElementById('dateAffichage').innerText = new Date(dateJ).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'short'});
            
            // Boutons
            let running = data.t.length > 0 && data.t[data.t.length-1].e === "";
            document.getElementById('btnD').disabled = running;
            document.getElementById('btnR').disabled = !running;

            // Tranches
            let hT = "";
            data.t.forEach((tr, i) => {
                hT += `<div class="heure-box">
                    <input type="time" value="${tr.s}" onchange="editT(${i},'s',this.value)"> - 
                    <input type="time" value="${tr.e}" onchange="editT(${i},'e',this.value)">
                    <button onclick="delT(${i})" style="color:red; float:right;">X</button>
                </div>`;
            });
            document.getElementById('listeT').innerHTML = hT || "Aucune tranche";

            // Calculs
            let total = 0;
            data.t.forEach(tr => { if(tr.s && tr.e) {
                let [h1,m1]=tr.s.split(':').map(Number); let [h2,m2]=tr.e.split(':').map(Number);
                total += (h2*60+m2)-(h1*60+m1);
            }});
            let minC = 0;
            if(data.t.length === 1) minC = 120;
            else if(data.t.length === 2) minC = 180;
            else if(data.t.length >= 3) minC = 270;
            let conv = Math.max(total, minC);
            if(document.getElementById('halfH').checked && conv > 180) conv = Math.max(conv - 30, minC);

            document.getElementById('txtR').innerText = Math.floor(total/60)+'h'+(total%60).toString().padStart(2,'0');
            document.getElementById('txtC').innerText = Math.floor(conv/60)+'h'+(conv%60).toString().padStart(2,'0');
            document.getElementById('inKm').value = data.km || "";
            document.getElementById('inCom').value = data.com || "";

            majEleves();
        }

        function majEleves() {
            let data = db[dateJ] || { t: [], km: "", com: "", p: {} };
            document.getElementById('divList').innerHTML = eleves.map((e,i) => `<div>${e} <button onclick="eleves.splice(${i},1); sauver();">X</button></div>`).join('');
            
            let hP = "";
            eleves.forEach(e => {
                hP += `<div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:5px;">
                    <b>${e}</b><div class="flex" style="margin-top:5px;">
                    ${['MA','MR','SA','SR'].map(type => `
                        <button onclick="toggleP('${e}','${type}')" class="check-btn ${(data.p[e]||[]).includes(type)?'active':''}">${type}</button>
                    `).join('')}</div></div>`;
            });
            document.getElementById('gridP').innerHTML = hP || "Ajoutez des élèves d'abord.";
        }

        function toggleP(nom, type) {
            let data = db[dateJ] || { t: [], km: "", com: "", p: {} };
            if(!data.p[nom]) data.p[nom] = [];
            if(data.p[nom].includes(type)) data.p[nom] = data.p[nom].filter(x => x !== type);
            else data.p[nom].push(type);
            db[dateJ] = data; sauver();
        }

        function editT(i,f,v) { let data = db[dateJ]; data.t[i][f]=v; db[dateJ]=data; sauver(); }
        function delT(i) { let data = db[dateJ]; data.t.splice(i,1); db[dateJ]=data; sauver(); }
        function ajouterM() { let data = db[dateJ] || { t: [], km: "", com: "", p: {} }; data.t.push({s:"08:00",e:"09:00",f:0}); db[dateJ]=data; sauver(); }
        function addE() { let n = document.getElementById('newE').value; if(n){ eleves.push(n); document.getElementById('newE').value=""; sauver(); }}
        function saveInputs() { let data = db[dateJ] || { t: [], km: "", com: "", p: {} }; data.km = document.getElementById('inKm').value; data.com = document.getElementById('inCom').value; db[dateJ]=data; localStorage.setItem('adada_final_db', JSON.stringify(db)); }
        function sauver() { localStorage.setItem('adada_final_db', JSON.stringify(db)); localStorage.setItem('adada_final_eleves', JSON.stringify(eleves)); maj(); }
        function ouvrir(id) { 
            if(id === 'modRecap') {
                let data = db[dateJ] || { t: [] };
                let txt = "Rapport du " + dateJ + "\n\n";
                data.t.forEach(t => txt += t.s + " - " + t.e + "\n");
                txt += "\nHEURES: " + document.getElementById('txtC').innerText;
                txt += "\nKM: " + (data.km || "---");
                document.getElementById('resRecap').innerText = txt;
            }
            document.getElementById(id).style.display = 'block'; 
        }
        function fermer(id) { document.getElementById(id).style.display = 'none'; }

        maj();
    </script>
</body>
</html>
