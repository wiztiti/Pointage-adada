<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADADA FINAL PRO</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0fdf4; padding: 15px; margin: 0; color: #1e293b; }
        .card { background: white; padding: 15px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #dcfce7; }
        h3 { text-align: center; margin: 0 0 15px 0; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        
        .flex-center { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .btn-action { width: 120px; padding: 15px; border: none; border-radius: 15px; font-weight: 800; font-size: 13px; cursor: pointer; }
        .btn-depart { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .btn-retour { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-action:disabled { opacity: 0.3; cursor: not-allowed; }

        /* HEURES DU JOUR : Noir et pas de gras */
        .heure-val { font-weight: normal; font-size: 20px; display: block; margin-top: 5px; color: #000000 !important; }

        /* Suppression des flèches menus */
        details summary { list-style: none; cursor: pointer; text-align: center; font-weight: bold; color: #64748b; font-size: 13px; outline: none; }
        details summary::-webkit-details-marker { display: none; }
        
        .heure-box { background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 8px; display: flex; align-items: center; justify-content: space-between; }
        .heure-box input { border: none; background: transparent; font-size: 15px; width: 70px; text-align: center; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); padding: 20px; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 25px; max-width: 450px; margin: 20px auto; position: relative; max-height: 90vh; overflow-y: auto; }
        
        .check-grid { display: grid; grid-template-cols: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .check-btn { padding: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: white; font-size: 11px; font-weight: bold; color: #64748b; }
        .check-btn.active { background: #16a34a; color: white; border-color: #16a34a; }

        input[type="number"] { border: 1px solid #cbd5e1; border-radius: 10px; padding: 10px; width: 100%; box-sizing: border-box; text-align: center; font-size: 16px; }
        textarea { width: 100%; border: 1px solid #e2e8f0; border-radius: 12px; padding: 10px; box-sizing: border-box; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button onclick="navDate(-1)" style="border:none; background:none; font-size:25px; color:#16a34a;">❮</button>
            <b id="dateAffichage">...</b>
            <button onclick="navDate(1)" style="border:none; background:none; font-size:25px; color:#16a34a;">❯</button>
        </div>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="ouvrir('modRecap')" style="color:#16a34a; background:none; border:none; text-decoration:underline; font-size:12px; font-weight:bold;">VOIR RÉCAPITULATIF</button>
        </div>
    </div>

    <div class="flex-center">
        <button id="btnD" class="btn-action btn-depart" onclick="clicAction('D')">DÉPART</button>
        <button id="btnR" class="btn-action btn-retour" onclick="clicAction('R')">RETOUR</button>
    </div>

    <div class="card">
        <h3>HEURES DU JOUR</h3>
        <div style="display:flex; justify-content:space-around; align-items:center; text-align:center;">
            <div>
                <span style="font-size:10px; color:#94a3b8; font-weight:bold;">RÉELLES</span>
                <span id="txtR" class="heure-val">0h00</span>
            </div>
            <div style="border-left: 1px solid #f1f5f9; height: 35px;"></div>
            <div>
                <span style="font-size:10px; color:#94a3b8; font-weight:bold;">CONVENTIONNELLES</span>
                <span id="txtC" class="heure-val">0h00</span>
            </div>
        </div>
        <div style="text-align:center; margin-top:15px; border-top:1px solid #f1f5f9; padding-top:10px;">
            <label style="font-size:12px; font-weight:bold; color:#64748b; cursor:pointer;">
                <input type="checkbox" id="halfH" onchange="maj()"> Appliquer la déduction - 1/2 heure
            </label>
        </div>
    </div>

    <details class="card">
        <summary>TRANCHES DE TRAVAIL</summary>
        <div id="listeT" style="margin-top:10px;"></div>
        <button onclick="ajouterM()" style="width:100%; margin-top:10px; font-size:11px; color:#94a3b8; background:none; border:1px dashed #cbd5e1; padding:8px; border-radius:10px;">+ AJOUTER MANUELLEMENT</button>
    </details>

    <div class="card">
        <h3>VÉHICULE & NOTES</h3>
        <input type="number" id="inKm" oninput="saveInputs()" placeholder="KM FIN DE JOURNÉE">
        <textarea id="inCom" oninput="saveInputs()" placeholder="Notes ou remarques..." rows="2"></textarea>
    </div>

    <details class="card">
        <summary>GESTION ÉLÈVES</summary>
        <div style="margin-top:15px; display:flex; flex-direction:column; gap:10px;">
