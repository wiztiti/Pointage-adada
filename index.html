<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADADA PRÉCIS</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0fdf4; padding: 15px; margin: 0; color: #1e293b; }
        .card { background: white; padding: 15px; border-radius: 20px; border: 1px solid #dcfce7; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { text-align: center; margin: 0 0 10px 0; font-size: 12px; color: #64748b; text-transform: uppercase; }
        .nav { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-green { background: none; border: none; font-size: 24px; color: #16a34a; cursor: pointer; }
        .flex { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn { width: 120px; padding: 15px; border: none; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-d { background: #fee2e2; color: #b91c1c; }
        .btn-r { background: #dcfce7; color: #15803d; }
        .btn:disabled { opacity: 0.3; }
        .heure-val { font-weight: normal; font-size: 22px; color: #000; display: block; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 16px; margin-top: 10px; }
        .tranche { background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 8px; display: flex; justify-content: space-around; align-items: center; }
        .tranche input { width: 80px; border: none; background: transparent; text-align: center; margin: 0; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; max-width: 400px; margin: auto; }
        .grid { display: grid; grid-template-cols: repeat(4, 1fr); gap: 5px; margin-top: 5px; }
        .p-btn { padding: 10px 0; border: 1px solid #eee; border-radius: 5px; background: white; font-size: 11px; }
        .p-btn.active { background: #16a34a; color: white; }
    </style>
</head>
<body>

    <div class="card">
        <div class="nav">
            <button class="btn-green" onclick="changerDate(-1)">❮</button>
            <span id="dateTexte">...</span>
            <button class="btn-green" onclick="changerDate(1)">❯</button>
        </div>
    </div>

    <div class="flex">
        <button id="bD" class="btn btn-d" onclick="pointer('D')">DÉPART</button>
        <button id="bR" class="btn btn-r" onclick="pointer('R')">RETOUR</button>
    </div>

    <div class="card" style="text-align:center;">
        <div style="display:flex; justify-content:space-around;">
            <div><small>RÉELLES</small><span id="vR" class="heure-val">0h00</span></div>
            <div><small>CONVENTIONNELLES</small><span id="vC" class="heure-val">0h00</span></div>
        </div>
        <div style="margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
            <label style="font-size:12px;"><input type="checkbox" id="c30" onchange="maj()" style="width:auto;"> Déduction 1/2 heure</label>
        </div>
    </div>

    <details class="card">
        <summary>TRANCHES / NOTES / KM</summary>
        <div id="listeT"></div>
        <input type="number" id="iKm" placeholder="KM FIN" oninput="sauver()">
        <textarea id="iCo" placeholder="Notes..." oninput="sauver()"></textarea>
    </details>

    <div style="padding:0 15px;"><button onclick="ouvrir('mE')" style="width:100%; padding:15px; background:#1e293b; color:white; border-radius:15px; border:none; font-weight:bold;">ÉLÈVES & POINTAGE</button></div>

    <div id="mE" class="modal">
        <div class="modal-content">
            <h3>ÉLÈVES</h3>
            <div style="display:flex; gap:5px;"><input id="nE" placeholder="Nom..."><button onclick="ajouterE()" style="background:#16a34a; color:white; border:none; border-radius:10px; padding:0 15px;">+</button></div>
            <div id="lE" style="max-height:200px; overflow-y:auto; margin:10px 0;"></div>
            <hr>
            <div id="gP" style="max-height:200px; overflow-y:auto;"></div>
            <button onclick="fermer('mE')" style="width:100%; padding:15px; background:#eee; border:none; border-radius:10px; margin-top:10px;">FERMER</button>
        </div>
    </div>

    <script>
        let dateJ = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('adada_v9')) || {};
        let eleves = JSON.parse(localStorage.getItem('adada_el9')) || [];

        function maj() {
            if(!db[dateJ]) db[dateJ] = { t: [], km: "", co: "", p: {} };
            let d = db[dateJ];
            
            document.getElementById('dateTexte').innerText = new Date(dateJ).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'short'}).toUpperCase();
            
            let encours = d.t.length > 0 && d.t[d.t.length-1].e === "";
            document.getElementById('bD').disabled = encours;
            document.getElementById('bR').disabled = !encours;

            let total = 0; let hT = "";
            d.t.forEach((tr, i) => {
                hT += `<div class="tranche">
                    <input type="time" value="${tr.s}" onchange="edit(${i},'s',this.value)"> ➔ 
                    <input type="time" value="${tr.e}" onchange="edit(${i},'e',this.value)">
                    <button onclick="suppr(${i})" style="color:red; border:none; background:none;">X</button>
                </div>`;
                if(tr.s && tr.e) {
                    let s = tr.s.split(':'); let e = tr.e.split(':');
                    total += (parseInt(e[0])*60+parseInt(e[1])) - (parseInt(s[0])*60+parseInt(s[1]));
                }
            });
            document.getElementById('listeT').innerHTML = hT;

            let minC = d.t.length === 1 ? 120 : (d.t.length === 2 ? 180 : (d.t.length >= 3 ? 270 : 0));
            let conv = Math.max(total, minC);
            if(document.getElementById('c30').checked && conv > 180) conv = Math.max(conv-30, minC);

            document.getElementById('vR').innerText = Math.floor(total/60)+'h'+(total%60).toString().padStart(2,'0');
            document.getElementById('vC').innerText = Math.floor(conv/60)+'h'+(conv%60).toString().padStart(2,'0');
            document.getElementById('iKm').value = d.km;
            document.getElementById('iCo').value = d.co;

            document.getElementById('lE').innerHTML = eleves.map((e,i)=>`<div>${e} <button onclick="supprE(${i})">X</button></div>`).join('');
            let hP = "";
            eleves.forEach(e => {
                if(!d.p[e]) d.p[e] = [];
                hP += `<div><b>${e}</b><div class="grid">${['MA','MR','SA','SR'].map(x=>`<button class="p-btn ${d.p[e].includes(x)?'active':''}" onclick="togP('${e.replace(/'/g,"\\'")}','${x}')">${x}</button>`).join('')}</div></div>`;
            });
            document.getElementById('gP').innerHTML = hP;
        }

        function pointer(type) {
            let h = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
            if(type==='D') db[dateJ].t.push({s:h, e:""});
            else if(db[dateJ].t.length>0) db[dateJ].t[db[dateJ].t.length-1].e = h;
            sauver();
        }

        function edit(i,f,v) { db[dateJ].t[i][f]=v; sauver(); }
        function suppr(i) { db[dateJ].t.splice(i,1); sauver(); }
        function togP(n,x) { 
            let l = db[dateJ].p[n];
            db[dateJ].p[n] = l.includes(x) ? l.filter(y=>y!==x) : [...l, x];
            sauver(); 
        }
        function ajouterE() { let v = document.getElementById('nE').value; if(v){ eleves.push(v); document.getElementById('nE').value=""; sauver(); } }
        function supprE(i) { eleves.splice(i,1); sauver(); }
        function changerDate(n) { let d = new Date(dateJ); d.setDate(d.getDate()+n); dateJ = d.toISOString().split('T')[0]; maj(); }
        function ouvrir(id) { document.getElementById(id).style.display='block'; }
        function fermer(id) { document.getElementById(id).style.display='none'; }
        function sauver() { 
            db[dateJ].km = document.getElementById('iKm').value; 
            db[dateJ].co = document.getElementById('iCo').value;
            localStorage.setItem('adada_v9', JSON.stringify(db)); 
            localStorage.setItem('adada_el9', JSON.stringify(eleves)); 
            maj(); 
        }

        window.onload = maj;
    </script>
</body>
</html>
