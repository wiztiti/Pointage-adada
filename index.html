<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADADA POINTAGE PRO</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0fdf4; padding: 15px; margin: 0; color: #1e293b; }
        .card { background: white; padding: 15px; border-radius: 20px; border: 1px solid #dcfce7; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { text-align: center; margin: 0 0 10px 0; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Navigation Date */
        .nav-date { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .btn-nav { background: none; border: none; font-size: 26px; color: #16a34a; cursor: pointer; padding: 0 15px; }

        /* Boutons Action */
        .flex-btns { display: flex; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn-main { width: 125px; padding: 16px; border: none; border-radius: 15px; font-weight: 800; font-size: 13px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-dep { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .btn-ret { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .btn-main:disabled { opacity: 0.3; filter: grayscale(1); }

        /* Affichage Heures : NOIR ET NORMAL */
        .heure-display { font-weight: normal; font-size: 22px; color: #000000 !important; display: block; margin-top: 5px; }
        
        /* Tranches */
        .tranche-row { background: #f8fafc; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 8px; display: flex; justify-content: space-around; align-items: center; }
        .tranche-row input { width: 85px; border: 1px solid #eee; background: white; text-align: center; border-radius: 5px; padding: 3px; font-size: 15px; }

        /* Formulaire */
        input[type="number"], textarea { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 12px; box-sizing: border-box; font-size: 15px; margin-top: 10px; }
        
        /* Modales */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; padding: 20px; }
        .modal-content { background: white; padding: 20px; border-radius: 25px; max-width: 450px; margin: auto; max-height: 85vh; overflow-y: auto; }
        
        /* Élèves */
        .p-grid { display: grid; grid-template-cols: repeat(4, 1fr); gap: 6px; margin-top: 5px; }
        .p-btn { padding: 10px 0; border: 1px solid #e2e8f0; border-radius: 8px; background: white; font-size: 11px; font-weight: bold; color: #64748b; }
        .p-btn.active { background: #16a34a; color: white; border-color: #16a34a; }

        /* Suppression flèche details */
        summary { list-style: none; cursor: pointer; text-align: center; font-weight: bold; color: #64748b; font-size: 12px; }
        summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body>

    <div class="card">
        <div class="nav-date">
            <button class="btn-nav" onclick="changeDate(-1)">❮</button>
            <span id="dateTxt">...</span>
            <button class="btn-nav" onclick="changeDate(1)">❯</button>
        </div>
        <div style="text-align:center; margin-top:10px;">
            <button onclick="openModal('modRecap')" style="color:#16a34a; background:none; border:none; text-decoration:underline; font-size:11px; font-weight:bold;">VOIR RÉCAPITULATIF</button>
        </div>
    </div>

    <div class="flex-btns">
        <button id="btnD" class="btn-main btn-dep" onclick="doAction('D')">DÉPART</button>
        <button id="btnR" class="btn-main btn-ret" onclick="doAction('R')">RETOUR</button>
    </div>

    <div class="card" style="text-align:center;">
        <h3>HEURES DU JOUR</h3>
        <div style="display:flex; justify-content:space-around; align-items:center;">
            <div><small style="color:#94a3b8; font-weight:bold;">RÉELLES</small><span id="vReelle" class="heure-display">0h00</span></div>
            <div style="border-left:1px solid #f1f5f9; height:35px;"></div>
            <div><small style="color:#94a3b8; font-weight:bold;">CONVENTIONNELLES</small><span id="vConv" class="heure-display">0h00</span></div>
        </div>
        <div style="margin-top:15px; border-top:1px solid #f1f5f9; padding-top:10px;">
            <label style="font-size:12px; font-weight:bold; color:#64748b;"><input type="checkbox" id="check30" onchange="render()" style="width:auto;"> Appliquer la déduction - 1/2 heure</label>
        </div>
    </div>

    <details class="card">
        <summary>TRANCHES / KM / NOTES</summary>
        <div id="trancheList" style="margin-top:10px;"></div>
        <button onclick="addManual()" style="width:100%; margin:10px 0; font-size:10px; color:#94a3b8; background:none; border:1px dashed #cbd5e1; padding:8px; border-radius:10px;">+ AJOUTER MANUELLEMENT</button>
        <input type="number" id="kmInput" placeholder="KM FIN DE JOURNÉE" oninput="saveFields()">
        <textarea id="noteInput" placeholder="Notes du jour..." rows="2" oninput="saveFields()"></textarea>
    </details>

    <div style="padding:0 15px;">
        <button onclick="openModal('modEleves')" style="width:100%; padding:16px; background:#1e293b; color:white; border-radius:18px; border:none; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">ÉLÈVES & POINTAGE</button>
        <div id="resEleves" style="font-size:11px; color:#94a3b8; text-align:center; margin-top:10px; font-style:italic;"></div>
    </div>

    <div id="modRecap" class="modal" onclick="closeModal('modRecap')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>RAPPORT JOURNALIER</h3>
            <pre id="recapTxt" style="white-space:pre-wrap; font-family:monospace; font-size:12px; background:#f8fafc; padding:15px; border-radius:15px; border:1px solid #e2e8f0;"></pre>
            <button onclick="closeModal('modRecap')" style="width:100%; padding:15px; margin-top:15px; border-radius:15px; border:none; background:#f1f5f9; font-weight:bold;">FERMER</button>
        </div>
    </div>

    <div id="modEleves" class="modal">
        <div class="modal-content">
            <h3>GESTION ÉLÈVES</h3>
            <div style="display:flex; gap:8px; margin-bottom:15px;">
                <input id="newE" placeholder="Prénom..." style="margin:0; flex:1;">
                <button onclick="addE()" style="background:#16a34a; color:white; border:none; border-radius:12px; padding:0 20px; font-weight:bold;">+</button>
            </div>
            <div id="listE" style="max-height:150px; overflow-y:auto; border-bottom:1px solid #eee; margin-bottom:15px;"></div>
            <div id="gridP"></div>
            <button onclick="closeModal('modEleves')" style="width:100%; padding:15px; margin-top:15px; border-radius:15px; background:#1e293b; color:white; border:none; font-weight:bold;">VALIDER</button>
        </div>
    </div>

    <script>
        let curDate = new Date().toISOString().split('T')[0];
        let db = JSON.parse(localStorage.getItem('ADADA_PRO_V1')) || {};
        let eleves = JSON.parse(localStorage.getItem('ADADA_EL_V1')) || [];

        function initDay() { if(!db[curDate]) db[curDate] = { t: [], km: "", n: "", p: {} }; }

        function render() {
            initDay();
            const data = db[curDate];
            document.getElementById('dateTxt').innerText = new Date(curDate).toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'short'}).toUpperCase();
            
            const running = data.t.length > 0 && data.t[data.t.length-1].e === "";
            document.getElementById('btnD').disabled = running;
            document.getElementById('btnR').disabled = !running;

            let totalM = 0; let htmlT = "";
            data.t.forEach((tr, i) => {
                htmlT += `<div class="tranche-row">
                    <input type="time" value="${tr.s}" onchange="editT(${i},'s',this.value)"> ➔ 
                    <input type="time" value="${tr.e}" onchange="editT(${i},'e',this.value)">
                    <button onclick="delT(${i})" style="color:#f87171; border:none; background:none; font-size:18px; font-weight:bold;">×</button>
                </div>`;
                if(tr.s && tr.e) {
                    const [h1,m1] = tr.s.split(':').map(Number);
                    const [h2,m2] = tr.e.split(':').map(Number);
                    totalM += (h2*60+m2)-(h1*60+m1);
                }
            });
            document.getElementById('trancheList').innerHTML = htmlT;

            let minC = data.t.length === 1 ? 120 : (data.t.length === 2 ? 180 : (data.t.length >= 3 ? 270 : 0));
            let cVal = Math.max(totalM, minC);
            if(document.getElementById('check30').checked && cVal > 180) cVal = Math.max(cVal-30, minC);

            document.getElementById('vReelle').innerText = Math.floor(totalM/60)+'h'+(totalM%60).toString().padStart(2,'0');
            document.getElementById('vConv').innerText = Math.floor(cVal/60)+'h'+(cVal%60).toString().padStart(2,'0');
            document.getElementById('kmInput').value = data.km;
            document.getElementById('noteInput').value = data.n;

            renderEleves(data);
        }

        function renderEleves(data) {
            document.getElementById('listE').innerHTML = eleves.map((e,i)=>`<div style="display:flex; justify-content:space-between; padding:8px 0;"><span>${e}</span><button onclick="delE(${i})" style="color:red; border:none; background:none;">Suppr.</button></div>`).join('');
            let htmlP = "";
            eleves.forEach(e => {
                if(!data.p[e]) data.p[e] = [];
                htmlP += `<div style="margin-bottom:12px;"><b>${e}</b><div class="p-grid">${['MA','MR','SA','SR'].map(x=>`<button class="p-btn ${data.p[e].includes(x)?'active':''}" onclick="togP('${e.replace(/'/g,"\\'")}','${x}')">${x}</button>`).join('')}</div></div>`;
            });
            document.getElementById('gridP').innerHTML = htmlP;
            const pts = Object.keys(data.p).filter(k => data.p[k].length > 0);
            document.getElementById('resEleves').innerText = pts.length ? "Présents : " + pts.join(', ') : "";
        }

        function doAction(type) {
            const h = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
            if(type==='D') db[curDate].t.push({s:h, e:""});
            else if(db[curDate].t.length>0) db[curDate].t[db[curDate].t.length-1].e = h;
            save();
        }

        function togP(n,x) { let l=db[curDate].p[n]; db[curDate].p[n]=l.includes(x)?l.filter(y=>y!==x):[...l,x]; save(); }
        function editT(i,f,v) { db[curDate].t[i][f]=v; save(); }
        function delT(i) { db[curDate].t.splice(i,1); save(); }
        function addManual() { db[curDate].t.push({s:"08:00",e:"17:00"}); save(); }
        function addE() { const v=document.getElementById('newE').value; if(v){ eleves.push(v); document.getElementById('newE').value=""; save(); } }
        function delE(i) { eleves.splice(i,1); save(); }
        function changeDate(n) { let d=new Date(curDate); d.setDate(d.getDate()+n); curDate=d.toISOString().split('T')[0]; render(); }
        function openModal(id) {
            if(id==='modRecap') {
                const d=db[curDate];
                let t = `DATE : ${curDate}\n\n`;
                d.t.forEach(tr => t+=`TRAVAIL : ${tr.s} - ${tr.e}\n`);
                t+=`REELLES : ${document.getElementById('vReelle').innerText}\n`;
                t+=`CONVENTIONNELLES : ${document.getElementById('vConv').innerText}\n`;
                t+=`KM : ${d.km || "0"}\nNOTES : ${d.n || "/"}`;
                document.getElementById('recapTxt').innerText = t;
            }
            document.getElementById(id).style.display='block';
        }
        function closeModal(id) { document.getElementById(id).style.display='none'; }
        function saveFields() { db[curDate].km = document.getElementById('kmInput').value; db[curDate].n = document.getElementById('noteInput').value; localStorage.setItem('ADADA_PRO_V1', JSON.stringify(db)); }
        function save() { localStorage.setItem('ADADA_PRO_V1', JSON.stringify(db)); localStorage.setItem('ADADA_EL_V1', JSON.stringify(eleves)); render(); }

        window.onload = render;
    </script>
</body>
</html>
